        <style>
            .lblSesionesPaquete{
                color: cornflowerblue;
                font-weight: bold;
                font-size: 15pt;
            }
            .accordion-button:not(.collapsed) {
                color: white;
                background-color: wheat;
            }
            .LstHorariosDisponibles,.LstHorariosFinDisponibles {
                list-style: none;
                padding: 0;
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            .itemHorario,.itemHorarioFin {
                background: #f1f1f1;
                padding: 10px 15px;
                border-radius: 20px;
                cursor: pointer;
                user-select: none;
                transition: 0.2s;
            }

            .itemHorario,.itemHorarioFin:hover {
                background: #ddd;
            }

            .itemHorario.selected,.itemHorarioFin.selected {
                background: #007bff;
                color: white;
            }

            .itemHorario,.itemHorarioFin::before {
                content: "○ ";
            }

            .itemHorario,.itemHorarioFin.selected::before {
                content: "● ";
            }
        </style>
    </head>
<body id="page-top">
    <div class="dvLoader">
        <div class="dvLoaderContenido">
            <div class="spinner-border d-flex" role="status">
            </div>
            <p>Cargando</p>
        </div>
    </div>
    <!-- Page Heading -->
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Seguimiento cíta</h1>
        <label class="lblSesionesPaquete"></label>
    </div>
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h4 class="m-0 font-weight-bold text-primary">Reagendar</h4>
        </div>
        <div class="row">
            <div class="col">
                <button type="button" class="btn btn-primary btnAceptarReagendar float-right">Aceptar</button>
            </div>
        </div>        
        <div class="card-body">
            <div class="container">
                <div class="form-check form-check-inline">
                    <input class="form-check-input chkRegendar" type="radio" name="inlineRadioOptions" id="chkRegendar1" value="1">
                    <label class="form-check-label" for="chkRegendar">Sí</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input chkRegendar" type="radio" name="inlineRadioOptions" id="chkRegendar2" value="0">
                    <label class="form-check-label" for="chkRegendar2">No</label>
                </div>
            </div>
           <div class="container dvReagendar" style="display: none;">
                <div class="row">
                    <div class="col">
                        <label>Categoría:</label>
                        <select class="form-control ddlCategoria inputCapture" id="ddlCategoria"></select>
                    </div>
                    <div class="col">
                        <label>Servicio:</label>
                        <select class="form-control ddlServicio inputCapture" id="ddlServicio"></select>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label>Fecha:</label>
                        <input type="date" class="form-control txtFechaCita inputCapture" id="txtFechaCita" maxlength="10" style="width: 150px;">
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label>Hora inicio:</label>
                        <ul class="LstHorariosDisponibles"></ul>
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label>Hora fin:</label>
                        <ul class="LstHorariosFinDisponibles"></ul>
                    </div>
                </div>
           </div>
           <div class="container dvNoReagendar" style="display: none;">
                <div class="row">
                    <div class="col">
                        <label>Motivo:</label>
                        <select class="form-control ddlMotivoNoReagendar inputCapture" id="ddlMotivoNoReagendar">
                            <option value="0"></option>
                            <option value="1">Falta de dinero</option>
                            <option value="2">Lo va a pensar</option>
                            <option value="3">Mejoría</option>
                            <option value="4">No le gusto la atención</option>
                            <option value="5">Otro</option>
                        </select>
                    </div>
                </div>
                <div class="row rowComentariosNoReagendar" style="display: none;">
                    <div class="col">
                        <label>Comentarios:</label>
                        <textarea class="form-control txtComentariosNoReagendar inputCapture" id="txtComentariosNoReagendar" rows="3"></textarea>
                    </div>
                </div>
           </div>
        </div>
    </div>

    <script>
            
        $(document).ready(async function(){   
            const StatusAppointment = {
                Cancelado: -1,
                Registrado: 1,
                Confirmado: 2,
                ConfirmacionLlegada: 3,
                Atendido: 4,
                Pagado: 5,
                Finalizado: 6,
                Reagendar: 7,
            };
            await SeleccionarDatosPacientes();
            await SeleccionarDatosSucursales();

       });                           
   </script>
