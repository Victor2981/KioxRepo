// 🚀 INSERTAR EN FIREBASE
async function insertarDiagnosticos() {
    for (const d of diagnosticos) {
        await db.collection("MedicalConditions").add({
            Name: d.Name,
            Category: d.Category,
            Subcategory: d.Subcategory,
            Status: 2
        });
    }
    alert("Diagnósticos insertados correctamente 🚀");
}


// 🔍 AUTOCOMPLETE
const input = document.getElementById("search");

input.addEventListener("keyup", function() {
    const val = this.value.toLowerCase();
    const list = document.getElementById("autocomplete-list");
    list.innerHTML = "";

    if (!val) return;

    const filtrados = diagnosticos.filter(d =>
        d.Name.toLowerCase().includes(val)
    );

    filtrados.forEach(d => {
        const div = document.createElement("div");
        div.innerHTML = `<strong>${d.Name}</strong><br>
                         <small>${d.Category} - ${d.Subcategory}</small>`;

        div.addEventListener("click", function() {
            input.value = d.Name;
            list.innerHTML = "";
        });

        list.appendChild(div);
    });
});
