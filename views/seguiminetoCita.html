            .lblSesionesPaquete{

     #inputDiagnostico {
    width: 100%;
    padding: 10px;
}

.autocomplete-items {
    border: 1px solid #ccc;
    max-height: 150px;
    overflow-y: auto;
}

.autocomplete-items div {
    padding: 8px;
    cursor: pointer;
}

.autocomplete-items div:hover {
    background: #eee;
}

/* Chips */
.chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
}

.chip {
    color: white;
    padding: 6px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    font-size: 13px;
}

.chip span {
    margin-left: 8px;
    cursor: pointer;
    font-weight: bold;
}

/* Etiqueta categoría */
.tagCategoria {
    font-size: 10px;
    margin-left: 6px;
    opacity: 0.8;
}

<body id="page-top">
    <div class="dvLoader">
        <div class="dvLoaderContenido">
            <div class="spinner-border d-flex" role="status">
            </div>
            <p>Cargando</p>
        </div>
    </div>
    <!-- Page Heading -->
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Seguimiento cíta</h1>
        <label class="lblSesionesPaquete"></label>
    </div>
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h4 class="m-0 font-weight-bold text-primary">Información paciente</h4>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col">
                  <label>Nombre:</label>
                  <p id="pNombre" class="pNombre"></p><label class="lblSesionesPaquete"></label>
                </div>
            </div>
            <div class="card-header py-3">
                <h4 class="m-0 font-weight-bold text-primary">Datos de atención</h4>

                <div class="accordion accordionNote" id="accordionPanelsStayOpenExample">
                    <div class="accordion-item">
                      <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#panelsStayOpen-collapseOne" aria-expanded="true" aria-controls="panelsStayOpen-collapseOne">
                          Nota
                        </button>
                      </h2>
                      <div id="panelsStayOpen-collapseOne" class="accordion-collapse collapse show">
                        <div class="accordion-body">         
                            <div style="max-height: 200px; overflow: auto;">
                                <p id="pNotaCita" class="pNotaCita"></p>
                            </div>                            
                        </div>
                      </div>
                    </div>                    
                  </div>          
            </div>
            <div class="row">
                <div class="col">
                    <button type="button" class="btn btn-primary btnGuardarHistorial float-right">Guardar</button>
                    <button type="button" class="btn btn-danger btnFinishAppointment float-right">Finalizar cita</button>
                    <button type="button" class="btn btn-info btnFinishAppointmentMedicalDischarge float-right" data-bs-toggle="modal" data-bs-target="#exampleModal">Finalizar con alta</button>                                       
                </div>
            </div>        
            <div class="row rowDiagnostico">
                <div class="col">
                    <label>Diagnóstico:</label>                    
                    <input type="text" id="inputDiagnostico" class="ddlDiagnostico" placeholder="Buscar diagnóstico...">
                    <div id="autocomplete-list" class="autocomplete-items"></div>

                    <div class="chips" id="chipsContainer"></div>

                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label>Nota de evolución:</label>
                    <textarea  class="form-control txtObservaciones" id="txtObservaciones" rows="4" cols="50"></textarea>
                    <!-- <input type="text" class="form-control txtObservaciones" id="txtObservaciones" maxlength="30"> -->
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label>Recomendaciones:</label>
                    <textarea  class="form-control txtRecomendaciones" id="txtRecomendaciones" rows="4" cols="50"></textarea>
                    <!-- <input type="text" class="form-control txtRecomendaciones" id="txtRecomendaciones" maxlength="30"> -->
                </div>
            </div>
        </div>
    </div>



<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Alta médica</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>Selecciona los dianosticos que deseas dar como alta</p>
        <p>¿Está seguro de que desea finalizar la cita con alta médica?</p>
        <div style="height: 200px;overflow: auto;" class="dvAltaDiagnosticos">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-primary btnAceptarAltaDiagnostico" data-bs-dismiss="modal">Aceptar</button>
      </div>
    </div>
  </div>
</div>
